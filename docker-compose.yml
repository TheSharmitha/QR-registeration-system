version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ascas_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ascas_qr_reg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ascas_backend
    restart: always
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ascas_qr_reg?schema=public
      - JWT_SECRET=super-secret-jwt-key-change-this-in-production
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    ports:
      - "5555:5555"
    depends_on:
      - db
    # Run migrations and seed data before starting the server
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             node prisma/seed.js &&
             npm start"

  frontend:
    build: ./frontend
    container_name: ascas_frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ascas_nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
